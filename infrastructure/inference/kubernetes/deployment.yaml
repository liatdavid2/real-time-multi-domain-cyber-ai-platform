apiVersion: apps/v1
kind: Deployment

metadata:
  name: inference
  labels:
    app: inference

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inference

  template:
    metadata:
      labels:
        app: inference

    spec:
      containers:
        - name: inference
          image: 127393435473.dkr.ecr.us-east-1.amazonaws.com/intrusion-inference:latest

          ports:
            - containerPort: 8000

          env:
            - name: USE_S3
              value: "true"

            - name: MODEL_BUCKET
              value: "intrusion-ml-models"

            - name: MODEL_KEY
              value: "models/intrusion/latest/model.joblib"

            - name: MODEL_METRICS_KEY
              value: "models/intrusion/latest/metrics.json"

            - name: AWS_REGION
              value: "us-east-1"

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10