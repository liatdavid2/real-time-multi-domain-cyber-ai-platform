apiVersion: batch/v1
kind: Job
metadata:
  name: malware-training-job
spec:
  template:
    spec:
      containers:
        - name: trainer
          image: YOUR_IMAGE:latest

          env:
            - name: S3_BUCKET
              value: intrusion-ml-models

            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000

            - name: AWS_DEFAULT_REGION
              value: us-east-1

      restartPolicy: Never

  backoffLimit: 1